<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Christian Arns – Links</title>
  <meta name="description" content="Alle wichtigen Links von Christian Arns auf einen Blick.">
  <meta property="og:title" content="Christian Arns – Links">
  <meta property="og:description" content="Outreel, AI Content Hub, Podcast und Social Media.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://deine-domain.de/links">
  <meta property="og:image" content="/linktree/assets/og-image.jpg">
  <link rel="icon" href="/linktree/assets/favicon.png">

  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="wrap">
    <!-- HEADER -->
    <header class="profile">
      <h1 class="handle">@christian.arns</h1>
      <img class="avatar" src="/linktree/assets/avatar.jpg" alt="Christian Arns Avatar">
      <p class="subtitle">Filmemacher &amp; Content Automation</p>
    </header>

    <!-- LINKS -->
    <section class="tiles" aria-label="Wichtige Links">

      <!-- 1. Loopstudio -->
      <a class="tile" href="https://loopstudio.app/" target="_blank" rel="noopener">
        <img class="tile-icon" src="/linktree/assets/icons/skool.png" alt="Loopstudio Icon" loading="lazy">
        <div class="tile-text">
          <span class="tile-title">Loopstudio.app</span>
          <span class="tile-desc">Tutorials &amp; Automations</span>
        </div>
      </a>

      <!-- 2. Outreel -->
      <a class="tile" href="https://outreel.de/" target="_blank" rel="noopener">
        <img class="tile-icon" src="/linktree/assets/icons/outreel.png" alt="Outreel Icon" loading="lazy">
        <div class="tile-text">
          <span class="tile-title">Outreel.de – Agentur</span>
          <span class="tile-desc">Videoproduktion</span>
        </div>
      </a>

      <!-- 3. Podcast -->
      <a class="tile" href="https://weiterimchaos.de/" target="_blank" rel="noopener">
        <img class="tile-icon" src="/linktree/assets/icons/podcast.png" alt="Podcast Icon" loading="lazy">
        <div class="tile-text">
          <span class="tile-title">Podcast: Weiter im Chaos</span>
          <span class="tile-desc">Geschichten &amp; Kreativität</span>
        </div>
      </a>

      <!-- 4. Instagram -->
      <a class="tile" href="https://www.instagram.com/christian.arns/" target="_blank" rel="noopener">
        <img class="tile-icon" src="/linktree/assets/icons/instagram.png" alt="Instagram Icon" loading="lazy">
        <div class="tile-text">
          <span class="tile-title">Instagram</span>
          <span class="tile-desc">@christian.arns</span>
        </div>
      </a>

      <!-- 5. TikTok -->
      <a class="tile" href="https://www.tiktok.com/@christianarns" target="_blank" rel="noopener">
        <img class="tile-icon" src="/linktree/assets/icons/tiktok.png" alt="TikTok Icon" loading="lazy">
        <div class="tile-text">
          <span class="tile-title">TikTok</span>
          <span class="tile-desc">@christianarns</span>
        </div>
      </a>

      <!-- 6. YouTube -->
      <a class="tile" href="https://www.youtube.com/@ChristianArns" target="_blank" rel="noopener">
        <img class="tile-icon" src="/linktree/assets/icons/youtube.png" alt="YouTube Icon" loading="lazy">
        <div class="tile-text">
          <span class="tile-title">YouTube</span>
          <span class="tile-desc">Vlogs</span>
        </div>
      </a>

    </section>

    <!-- FOOTER -->
    <footer class="foot">
      <small>© <span id="year"></span> Christian Arns</small>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
